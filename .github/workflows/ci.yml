name: CI

on:
  push:
    branches: [main, v2-chunked-pipeline]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Core deps only — skip torch (too large for CI), whisper.cpp (needs build)
          pip install pydantic>=2.0.0 networkx>=3.0.0 matplotlib>=3.7.0
          pip install opencv-python-headless>=4.8.0
          pip install streamlit>=1.28.0 plotly>=5.17.0 pyvis>=0.3.2
          pip install pyyaml>=6.0 huggingface-hub>=0.19.0 requests
          pip install pytest>=7.4.0 black>=23.7.0 flake8>=6.0.0

      - name: Check formatting (black)
        run: black --check --diff src/ tests/

      - name: Lint (flake8)
        run: flake8 src/ tests/ --max-line-length 120 --extend-ignore=E501,W503

      - name: Run unit tests
        run: pytest tests/test_parser.py -v

      - name: Verify Python syntax (all modules)
        run: |
          python -c "
          import py_compile, sys
          files = [
              'src/pipeline_v2.py',
              'src/aggregator.py',
              'src/storage.py',
              'src/json_parser.py',
              'src/models.py',
              'src/graph_builder.py',
              'src/dataset_exporter.py',
              'src/batch_runner.py',
              'src/runtime_estimator.py',
              'src/backends/base.py',
              'src/backends/llama_server_backend.py',
              'src/modules/frame_selector.py',
              'src/modules/frame_scorer.py',
              'src/modules/whisper_cpp.py',
          ]
          ok = True
          for f in files:
              try:
                  py_compile.compile(f, doraise=True)
                  print(f'  ✓ {f}')
              except py_compile.PyCompileError as e:
                  print(f'  ✗ {f}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          "
